name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            platform: linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-15
            platform: darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-15
            platform: darwin-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libasound2-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Build release binary
        working-directory: server
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="realtime-${VERSION}-${{ matrix.platform }}.tar.gz"
          STAGING="realtime-${VERSION}"

          mkdir -p "${STAGING}/scripts"

          # Rust binary
          cp "server/target/${{ matrix.target }}/release/realtime" "${STAGING}/realtime-server"

          # CLI scripts
          cp server/realtime "${STAGING}/realtime"
          cp server/scripts/setup_utils.sh "${STAGING}/scripts/"
          cp server/scripts/cmd_onboard.sh "${STAGING}/scripts/"
          cp server/scripts/cmd_start.sh "${STAGING}/scripts/"
          cp server/scripts/cmd_doctor.sh "${STAGING}/scripts/"

          # Icon art (if exists)
          if [ -f server/scripts/icon_ascii.txt ]; then
            cp server/scripts/icon_ascii.txt "${STAGING}/scripts/"
          fi

          # Config template
          cp server/.env.example "${STAGING}/"

          # Make executable
          chmod +x "${STAGING}/realtime" "${STAGING}/realtime-server"

          tar -czf "${ARCHIVE}" -C "${STAGING}" .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
