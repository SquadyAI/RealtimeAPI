[build]
# 启用增量编译
incremental = true
# 启用 tokio 不稳定特性 (用于 tokio-console)
rustflags = ["--cfg", "tokio_unstable"]

[profile.dev]
# 开发模式优化：减少编译时间
opt-level = 0        # 不优化，加速编译
debug = true         # 保留调试信息
split-debuginfo = "unpacked"  # 分离调试信息，避免打包
codegen-units = 16   # 增加并行度，加速编译

[profile.release]
# 发布模式优化：平衡编译时间和性能
lto = "thin"         # Thin LTO 加速链接
codegen-units = 1    # 更好的优化
opt-level = 3        # 最大优化
panic = "abort"      # 减少二进制大小和编译时间
strip = true         # 自动 strip 调试符号
