services:
  # 生产环境版本
  realtime-asr:
    image: realtime-api:latest
    build:
      context: .
      dockerfile: Dockerfile.cpu
      target: runtime
    container_name: realtime-asr-prod
    ports:
      - "8081:8080"   # WebSocket/HTTP API端口
      - "16992:16992" # tokio-console端口
    environment:
      - RUST_LOG=${RUST_LOG:-warn}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-1}
      - BIND_ADDR=${BIND_ADDR:-0.0.0.0:8080}
      - MAX_CONCURRENT_SESSIONS=${MAX_CONCURRENT_SESSIONS:-100}
      - LLM_SKIP_CERT_VERIFICATION=${LLM_SKIP_CERT_VERIFICATION:-false}
      - TTS_MAX_SESSIONS=${TTS_MAX_SESSIONS:-100}
      - WS_PATH=${WS_PATH:-/ws}
      - WS_MESSAGE_TIMEOUT=${WS_MESSAGE_TIMEOUT:-5000}
      - WS_MAX_RETRIES=${WS_MAX_RETRIES:-3}
      - WS_ENABLE_COMPRESSION=${WS_ENABLE_COMPRESSION:-true}
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL:-http://localhost:8787}
      - SEARXNG_TIMEOUT_MS=${SEARXNG_TIMEOUT_MS:-5000}
      - SEARXNG_MAX_CONCURRENT_REQUESTS=${SEARXNG_MAX_CONCURRENT_REQUESTS:-200}
      - SEARXNG_ENABLE_CACHE=${SEARXNG_ENABLE_CACHE:-true}
      - SEARXNG_CACHE_TTL_SECONDS=${SEARXNG_CACHE_TTL_SECONDS:-300}
      - SEARXNG_ENABLE_STREAMING=${SEARXNG_ENABLE_STREAMING:-true}
      - SEARXNG_DEFAULT_ENGINES=${SEARXNG_DEFAULT_ENGINES:-brave,duckduckgo}
      - SEARXNG_DEFAULT_LANGUAGE=${SEARXNG_DEFAULT_LANGUAGE:-zh-CN}
      - SEARXNG_SAFE_SEARCH=${SEARXNG_SAFE_SEARCH:-0}
      - SEARXNG_MAX_RESULTS=${SEARXNG_MAX_RESULTS:-20}
      - SEARXNG_ENABLE_AUTOCOMPLETE=${SEARXNG_ENABLE_AUTOCOMPLETE:-true}
      - SEARXNG_AUTOCOMPLETE_SERVICE=${SEARXNG_AUTOCOMPLETE_SERVICE:-brave}
      - ENABLE_TTS=${ENABLE_TTS:-true}
      - GEOIP_MMDB_PATH=${GEOIP_MMDB_PATH:-/app/data/GeoIP2-City.mmdb}
    restart: unless-stopped
